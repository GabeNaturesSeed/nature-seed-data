name: Marketplace Management Bot

on:
  # schedule:
  #   # Tuesday at 2:00 PM MST (9:00 PM UTC)
  #   - cron: '0 21 * * 2'
  #   # Friday at 2:00 PM MST (9:00 PM UTC)
  #   - cron: '0 21 * * 5'
  workflow_dispatch: # Manual trigger only — cron disabled 2026-03-16

jobs:
  marketplace-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Create .env from secrets
        run: |
          cat > .env << 'ENVEOF'
          WALMART_CLIENT_ID=${{ secrets.WALMART_CLIENT_ID }}
          WALMART_CLIENT_SECRET=${{ secrets.WALMART_CLIENT_SECRET }}
          AMAZON_REFRESH_TOKEN=${{ secrets.AMAZON_REFRESH_TOKEN }}
          AMAZON_CLIENT_ID=${{ secrets.AMAZON_CLIENT_ID }}
          AMAZON_CLIENT_SECRET=${{ secrets.AMAZON_CLIENT_SECRET }}
          TELEGRAM_BOT_API=${{ secrets.TELEGRAM_BOT_API }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          ENVEOF

      - name: Run marketplace bot
        run: python marketplaces/marketplace-management/marketplace_bot.py

      - name: Commit action log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add marketplaces/marketplace-management/action_log.md
          git diff --staged --quiet || git commit -m "chore: marketplace bot action log $(date -u +%Y-%m-%d)"
          git push
