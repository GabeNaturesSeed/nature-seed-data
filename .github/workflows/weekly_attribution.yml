name: Weekly GCLID Attribution Report

on:
  schedule:
    # Every Sunday at 9:00 AM MST (4:00 PM UTC)
    - cron: '0 16 * * 0'
  workflow_dispatch:

jobs:
  attribution-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install google-ads google-auth google-api-python-client requests

      - name: Create .env from secrets
        run: |
          cat > .env << 'ENVEOF'
          GOOGLE_ADS_DEVELOPER_TOKEN=${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          GOOGLE_ADS_CLIENT_ID=${{ secrets.GOOGLE_ADS_CLIENT_ID }}
          GOOGLE_ADS_CLIENT_SECRET=${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
          GOOGLE_ADS_REFRESH_TOKEN=${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
          GOOGLE_ADS_CUSTOMER_ID=${{ secrets.GOOGLE_ADS_CUSTOMER_ID }}
          GOOGLE_ADS_LOGIN_CUSTOMER_ID=${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}
          WC_BASE_URL=https://naturesseed.com/wp-json/wc/v3
          WC_CK=${{ secrets.WC_CK }}
          WC_CS=${{ secrets.WC_CS }}
          CF_WORKER_URL=${{ secrets.CF_WORKER_URL }}
          CF_WORKER_SECRET=${{ secrets.CF_WORKER_SECRET }}
          TELEGRAM_BOT_API=${{ secrets.TELEGRAM_BOT_API }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          ENVEOF

      - name: Generate and send attribution report
        working-directory: marketing/google-ads-audit/drip
        run: python weekly_attribution_report.py

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: attribution-${{ github.run_number }}
          path: marketing/google-ads-audit/drip/reports/
          retention-days: 90
