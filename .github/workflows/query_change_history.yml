name: Query Google Ads Change History

on:
  push:
    branches:
      - 'claude/investigate-ads-performance-*'
  workflow_dispatch:

jobs:
  query-changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-ads google-auth

      - name: Create .env from secrets
        env:
          GADS_DEV_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          GADS_CLIENT_ID: ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
          GADS_CLIENT_SECRET: ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
          GADS_REFRESH_TOKEN: ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
          GADS_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_CUSTOMER_ID }}
          GADS_LOGIN_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}
        run: |
          printf "GOOGLE_ADS_DEVELOPER_TOKEN=%s\n" "$GADS_DEV_TOKEN" > .env
          printf "GOOGLE_ADS_CLIENT_ID=%s\n" "$GADS_CLIENT_ID" >> .env
          printf "GOOGLE_ADS_CLIENT_SECRET=%s\n" "$GADS_CLIENT_SECRET" >> .env
          printf "GOOGLE_ADS_REFRESH_TOKEN=%s\n" "$GADS_REFRESH_TOKEN" >> .env
          printf "GOOGLE_ADS_CUSTOMER_ID=%s\n" "$GADS_CUSTOMER_ID" >> .env
          printf "GOOGLE_ADS_LOGIN_CUSTOMER_ID=%s\n" "$GADS_LOGIN_CUSTOMER_ID" >> .env
          echo ".env created with $(wc -l < .env) lines"

      - name: Query change history and save results
        run: |
          python google-ads-audit/query_change_history.py 2>&1 | tee google-ads-audit/change_history_output.txt
          echo "Output saved ($(wc -l < google-ads-audit/change_history_output.txt) lines, $(wc -c < google-ads-audit/change_history_output.txt) bytes)"

      - name: Commit results back to branch
        if: always()
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add google-ads-audit/change_history_output.txt || true
          git diff --cached --quiet || git commit -m "data: Google Ads change history output [skip ci]"
          git push origin HEAD || echo "Push failed, results are in the artifact instead"

      - name: Upload output artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: change-history-output
          path: google-ads-audit/change_history_output.txt
          retention-days: 7
