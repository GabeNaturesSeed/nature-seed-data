name: Nightly Sales Review

on:
  schedule:
    # 8 AM MST = 3 PM UTC
    - cron: '0 15 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  nightly-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests google-ads google-auth

      - name: Create .env from secrets
        run: |
          cat > .env << 'ENVEOF'
          WC_BASE_URL=${{ secrets.WC_BASE_URL }}
          WC_CK=${{ secrets.WC_CK }}
          WC_CS=${{ secrets.WC_CS }}
          GOOGLE_ADS_DEVELOPER_TOKEN=${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          GOOGLE_ADS_CLIENT_ID=${{ secrets.GOOGLE_ADS_CLIENT_ID }}
          GOOGLE_ADS_CLIENT_SECRET=${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
          GOOGLE_ADS_REFRESH_TOKEN=${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
          GOOGLE_ADS_CUSTOMER_ID=${{ secrets.GOOGLE_ADS_CUSTOMER_ID }}
          GOOGLE_ADS_LOGIN_CUSTOMER_ID=${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_API_KEY=${{ secrets.SUPABASE_SECRET_API_KEY }}
          TELEGRAM_BOT_API=${{ secrets.TELEGRAM_BOT_API }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          CF_WORKER_URL=${{ secrets.CF_WORKER_URL }}
          CF_WORKER_SECRET=${{ secrets.CF_WORKER_SECRET }}
          ENVEOF

      - name: Send nightly review
        run: python daily-report/nightly_review.py
